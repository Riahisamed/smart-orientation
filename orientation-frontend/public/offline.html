<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smart Orientation offline</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #eff6ff, #f8fafc 45%, #ecfeff); color: #0f172a; display: grid; min-height: 100vh; place-items: center; }
      main { max-width: 460px; margin: 20px; padding: 28px; text-align: center; border: 1px solid #dbeafe; border-radius: 18px; background: rgba(255,255,255,.86); box-shadow: 0 24px 70px rgba(15,23,42,.12); }
      .logo { width: 58px; height: 58px; margin: 0 auto 16px; border-radius: 18px; display: grid; place-items: center; background: #2563eb; color: white; font-weight: 800; letter-spacing: .04em; }
      h1 { margin: 0 0 10px; font-size: 28px; }
      p { color: #475569; line-height: 1.6; }
      a { display: inline-block; margin-top: 14px; padding: 10px 14px; border-radius: 10px; background: #0f172a; color: white; text-decoration: none; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">SO</div>
      <h1>Mode hors ligne</h1>
      <p>Les pages deja visitees restent disponibles. Les fonctions IA et PDF demandent une connexion.</p>
      <a href="/dashboard">Revenir au tableau de bord</a>
    </main>
  </body>
</html>
